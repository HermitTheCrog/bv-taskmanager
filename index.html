<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bagavagabonds · Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --bg2: #161616;
    --bg3: #1e1e1e;
    --bg4: #252525;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #8a8680;
    --text3: #5a5753;
    --accent: #d4f060;
    --accent2: #a8c048;
    --accent-dim: rgba(212,240,96,0.08);
    --accent-dim2: rgba(212,240,96,0.15);
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.1);
    --amber: #ffb84d;
    --amber-dim: rgba(255,184,77,0.1);
    --blue: #5cb8ff;
    --blue-dim: rgba(92,184,255,0.1);
    --purple: #b57bff;
    --purple-dim: rgba(181,123,255,0.1);
    --r: 6px;
    --r2: 10px;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* AUTH SCREEN */
  .auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .auth-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .auth-card {
    position: relative;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 48px 52px;
    width: 420px;
    text-align: center;
  }
  .auth-logo {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 32px;
    font-family: var(--mono);
  }
  .auth-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .auth-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .auth-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--accent);
    color: #0e0e0e;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    border: none;
    border-radius: var(--r2);
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .auth-btn:hover { background: var(--accent2); }
  .auth-btn:active { transform: scale(0.98); }
  .auth-note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* SETUP SCREEN */
  .setup-screen {
    max-width: 640px;
    margin: 60px auto;
    padding: 0 24px;
  }
  .setup-header {
    margin-bottom: 32px;
  }
  .setup-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .setup-header p { color: var(--text2); font-size: 14px; }
  .setup-step {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 20px 24px;
    margin-bottom: 12px;
  }
  .setup-step-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .setup-step h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .setup-step p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .setup-step input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 10px;
    outline: none;
  }
  .setup-step input:focus { border-color: var(--accent); }
  .setup-step a { color: var(--accent); text-decoration: none; }
  .setup-step a:hover { text-decoration: underline; }
  .setup-save-btn {
    margin-top: 24px;
    background: var(--accent);
    color: #0e0e0e;
    font-family: var(--font);
    font-weight: 700;
    font-size: 14px;
    border: none;
    border-radius: var(--r2);
    padding: 12px 28px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .setup-save-btn:hover { background: var(--accent2); }

  /* APP LAYOUT */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOPBAR */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .tb-logo {
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    font-family: var(--mono);
    white-space: nowrap;
  }
  .tb-divider { width: 1px; height: 20px; background: var(--border2); }
  .tb-title { font-size: 13px; font-weight: 600; color: var(--text2); }
  .tb-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .tb-tab {
    font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: var(--r);
    border: 1px solid transparent;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    font-family: var(--font);
    transition: all 0.15s;
  }
  .tb-tab:hover { color: var(--text); background: var(--bg3); }
  .tb-tab.active { background: var(--accent-dim2); color: var(--accent); border-color: rgba(212,240,96,0.2); }
  .tb-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--bg4); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--accent);
    font-family: var(--mono);
    cursor: pointer;
    position: relative;
  }
  .tb-user-menu {
    position: absolute; top: 38px; right: 0;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--r2); padding: 4px;
    min-width: 180px;
    z-index: 200;
  }
  .tb-user-info {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .tb-user-name { font-size: 13px; font-weight: 600; }
  .tb-user-email { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  .tb-role-badge {
    display: inline-block;
    font-size: 10px; font-family: var(--mono);
    padding: 2px 6px; border-radius: 4px;
    margin-top: 4px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(212,240,96,0.2);
  }
  .menu-item {
    display: block; width: 100%;
    text-align: left;
    padding: 8px 12px;
    border-radius: var(--r);
    font-size: 13px; color: var(--text2);
    background: transparent; border: none;
    cursor: pointer; font-family: var(--font);
    transition: all 0.1s;
  }
  .menu-item:hover { background: var(--bg3); color: var(--text); }
  .menu-item.danger:hover { color: var(--red); }

  /* NEW TASK BTN */
  .new-task-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #0e0e0e;
    font-family: var(--font); font-weight: 700; font-size: 12px;
    border: none; border-radius: var(--r);
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .new-task-btn:hover { background: var(--accent2); }
  .new-task-btn:active { transform: scale(0.97); }
  .new-task-btn svg { width: 14px; height: 14px; }

  /* BOARD */
  .board {
    display: flex; gap: 14px;
    padding: 20px 24px;
    overflow-x: auto;
    flex: 1;
    align-items: flex-start;
  }

  .col {
    flex: 0 0 280px;
    display: flex; flex-direction: column;
    gap: 0;
  }
  .col-head {
    display: flex; align-items: center; gap: 8px;
    padding: 0 4px 12px;
  }
  .col-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .col-name {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; font-family: var(--mono);
    color: var(--text2);
  }
  .col-badge {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 1px 8px;
    color: var(--text3);
  }
  .col-body { display: flex; flex-direction: column; gap: 8px; }
  .col-empty {
    border: 1px dashed var(--border);
    border-radius: var(--r2);
    padding: 24px 16px;
    text-align: center;
    font-size: 12px; color: var(--text3);
    font-family: var(--mono);
  }

  /* TASK CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .card:hover { border-color: var(--border2); background: var(--bg3); }

  .card-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-family: var(--mono);
    padding: 2px 8px; border-radius: 4px;
    margin-bottom: 8px; font-weight: 500;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); margin-bottom: 5px;
    line-height: 1.4;
  }
  .card-desc {
    font-size: 12px; color: var(--text2);
    line-height: 1.5; margin-bottom: 12px;
  }
  .card-meta {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  .card-assignee {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text2); font-family: var(--mono);
  }
  .mini-av {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--bg4); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 700; color: var(--accent);
    font-family: var(--mono); flex-shrink: 0;
  }
  .timer-display {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 11px;
    color: var(--accent);
  }
  .timer-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .card-prio {
    position: absolute; top: 10px; right: 12px;
    font-size: 10px; font-family: var(--mono);
    padding: 2px 6px; border-radius: 4px;
  }
  .prio-high { background: var(--red-dim); color: var(--red); }
  .prio-med { background: var(--amber-dim); color: var(--amber); }
  .prio-low { background: var(--accent-dim); color: var(--accent); }

  .card-action-row {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .card-btn {
    flex: 1; font-family: var(--font); font-size: 11px; font-weight: 700;
    padding: 6px 10px; border-radius: var(--r); border: 1px solid var(--border2);
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em;
    background: transparent; color: var(--text2);
  }
  .card-btn:hover { background: var(--bg4); color: var(--text); }
  .card-btn.primary {
    background: var(--accent-dim); color: var(--accent);
    border-color: rgba(212,240,96,0.2);
  }
  .card-btn.primary:hover { background: var(--accent-dim2); }
  .card-btn.danger { color: var(--red); }
  .card-btn.danger:hover { background: var(--red-dim); border-color: rgba(255,92,92,0.2); }

  .done-line { text-decoration: line-through; color: var(--text3); }
  .done-time {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 10px; color: var(--text3);
  }

  /* CATEGORY COLORS */
  .cat-move .card::before { background: var(--blue); }
  .cat-move .card-tag { background: var(--blue-dim); color: var(--blue); }
  .cat-receive .card::before { background: var(--amber); }
  .cat-receive .card-tag { background: var(--amber-dim); color: var(--amber); }
  .cat-clean .card::before { background: var(--accent); }
  .cat-clean .card-tag { background: var(--accent-dim); color: var(--accent); }
  .cat-build .card::before { background: var(--purple); }
  .cat-build .card-tag { background: var(--purple-dim); color: var(--purple); }
  .cat-check .card::before { background: var(--red); }
  .cat-check .card-tag { background: var(--red-dim); color: var(--red); }
  .cat-other .card::before { background: var(--text3); }
  .cat-other .card-tag { background: var(--bg4); color: var(--text2); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 500;
    padding: 24px;
  }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px 32px;
    width: 100%; max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-size: 17px; font-weight: 800;
    margin-bottom: 24px; color: var(--text);
  }
  .modal-title span { color: var(--accent); }
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text2); margin-bottom: 6px; font-family: var(--mono);
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--r); color: var(--text);
    font-family: var(--font); font-size: 13px;
    padding: 10px 14px; outline: none;
    transition: border-color 0.15s;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field select option { background: var(--bg3); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions {
    display: flex; gap: 8px; margin-top: 24px; justify-content: flex-end;
  }
  .btn-cancel {
    background: transparent; border: 1px solid var(--border2);
    border-radius: var(--r); color: var(--text2);
    font-family: var(--font); font-size: 13px; font-weight: 600;
    padding: 9px 20px; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--bg3); color: var(--text); }
  .btn-primary {
    background: var(--accent); color: #0e0e0e;
    border: none; border-radius: var(--r);
    font-family: var(--font); font-size: 13px; font-weight: 700;
    padding: 9px 20px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent2); }

  /* LOG / HISTORY TABLE */
  .log-view { padding: 24px; max-width: 1100px; margin: 0 auto; }
  .log-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  }
  .log-header h2 { font-size: 20px; font-weight: 800; }
  .log-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .log-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--r2); padding: 14px 16px;
  }
  .stat-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--text); }
  .stat-val span { font-size: 12px; color: var(--text2); font-weight: 400; font-family: var(--mono); }
  .log-table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); overflow: hidden; }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th {
    text-align: left; padding: 10px 16px;
    font-size: 10px; font-family: var(--mono); letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    font-weight: 500;
  }
  .log-table td {
    padding: 11px 16px; font-size: 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text2); vertical-align: middle;
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--bg3); }
  .log-table td.task-name { color: var(--text); font-weight: 500; font-size: 13px; max-width: 200px; }
  .log-table td.mono { font-family: var(--mono); font-size: 11px; }
  .log-sheets-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--accent); font-family: var(--mono);
    background: var(--accent-dim); border: 1px solid rgba(212,240,96,0.2);
    border-radius: var(--r); padding: 6px 12px;
    cursor: pointer; text-decoration: none;
    transition: background 0.15s;
  }
  .log-sheets-btn:hover { background: var(--accent-dim2); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--r2); padding: 12px 20px;
    font-size: 13px; color: var(--text);
    z-index: 1000;
    animation: slideUp 0.2s ease;
    white-space: nowrap;
  }
  @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  .toast.success { border-color: rgba(212,240,96,0.3); color: var(--accent); }
  .toast.error { border-color: rgba(255,92,92,0.3); color: var(--red); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sync-indicator {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--mono); color: var(--text3);
  }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  .no-tasks {
    text-align: center; padding: 60px 24px;
    font-size: 13px; color: var(--text3); font-family: var(--mono);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
// Replace these with your actual values from Google Cloud Console
const CONFIG_KEY = 'bvb_config';
const TASKS_KEY = 'bvb_tasks';

const CATEGORIES = [
  { id: 'move', label: 'Movement', icon: '⇄' },
  { id: 'receive', label: 'Receiving', icon: '↓' },
  { id: 'clean', label: 'Maintenance', icon: '◇' },
  { id: 'build', label: 'Setup / Build', icon: '⌥' },
  { id: 'check', label: 'Audit / Check', icon: '✓' },
  { id: 'other', label: 'Other', icon: '·' },
];

const PRIORITIES = ['high', 'med', 'low'];

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '—';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function formatTime(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit', hour12: true });
}

function liveTimer(startMs) {
  const elapsed = Date.now() - startMs;
  return formatDuration(elapsed);
}

// ─── GOOGLE SHEETS API ──────────────────────────────────────────────────────
async function sheetsRequest(config, method, path, body = null) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${config.sheetId}${path}`;
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${config.accessToken}`,
      'Content-Type': 'application/json',
    },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(`Sheets API error: ${res.status}`);
  return res.json();
}

async function ensureSheetHeaders(config) {
  try {
    const data = await sheetsRequest(config, 'GET', '/values/Tasks!A1:K1');
    if (data.values && data.values[0] && data.values[0][0] === 'Task ID') return;
  } catch (e) {}
  const headers = [['Task ID','Title','Description','Category','Priority','Requested By','Assigned To','Created At','Accepted At','Completed At','Duration (ms)']];
  await sheetsRequest(config, 'PUT', '/values/Tasks!A1:K1?valueInputOption=RAW', { values: headers });
}

async function appendTaskToSheet(config, task) {
  await ensureSheetHeaders(config);
  const row = [
    task.id, task.title, task.desc, task.category, task.priority,
    task.createdBy, task.assignedTo || '',
    formatTime(task.createdAt), formatTime(task.acceptedAt),
    formatTime(task.completedAt), task.duration || ''
  ];
  await sheetsRequest(config, 'POST', '/values/Tasks!A:K:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS', { values: [row] });
}

async function updateTaskInSheet(config, task) {
  try {
    const data = await sheetsRequest(config, 'GET', '/values/Tasks!A:A');
    if (!data.values) return;
    const rowIdx = data.values.findIndex(r => r[0] === task.id);
    if (rowIdx < 1) { await appendTaskToSheet(config, task); return; }
    const row = rowIdx + 1;
    const values = [
      task.id, task.title, task.desc, task.category, task.priority,
      task.createdBy, task.assignedTo || '',
      formatTime(task.createdAt), formatTime(task.acceptedAt),
      formatTime(task.completedAt), task.duration || ''
    ];
    await sheetsRequest(config, 'PUT', `/values/Tasks!A${row}:K${row}?valueInputOption=RAW`, { values: [values] });
  } catch(e) { console.warn('Sheet update error', e); }
}

// ─── GMAIL NOTIFICATION ──────────────────────────────────────────────────────
async function sendEmailNotification(config, task) {
  if (!config.accessToken || !task.assignedToEmail) return;
  try {
    const subject = `[Bagavagabonds] New task assigned to you: ${task.title}`;
    const body = `Hi ${task.assignedTo || 'there'},\n\nYou have a new warehouse task:\n\nTitle: ${task.title}\nCategory: ${task.category}\nPriority: ${task.priority.toUpperCase()}\n${task.desc ? `\nDetails: ${task.desc}\n` : ''}\nRequested by: ${task.createdBy}\n\nLog in to the task board to accept and start the timer.\n\n— Bagavagabonds Task Board`;
    const email = [`To: ${task.assignedToEmail}`, `Subject: ${subject}`, `Content-Type: text/plain; charset=utf-8`, ``, body].join('\n');
    const encoded = btoa(unescape(encodeURIComponent(email))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${config.accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw: encoded })
    });
  } catch(e) { console.warn('Email send error', e); }
}

// ─── TIMER HOOK ──────────────────────────────────────────────────────────────
function useTimers(tasks) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);
  return tick;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{msg}</div>;
}

    const d = new Date(t.completedAt);

  });

  return (

      <div className="log-header">

        </div>

          <div className="stat-val">{formatDuration(avgDuration)}</div>
        </div>

          <div className="stat-label">Active right now</div>
          <div className="stat-val">{tasks.filter(t => t.acceptedAt && !t.completedAt).length}</div>
        </div>
      </div>

      <div className="log-table-wrap">
        {done.length === 0 ? (

            <thead>
              <tr>
                <th>Task</th>
                <th>Category</th>
                <th>Priority</th>

          </table>

    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [config, setConfig] = useState(() => {
    try { return JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch { return null; }
  });
  const [user, setUser] = useState(null);
  const [tasks, setTasks] = useState(() => {
    try { return JSON.parse(localStorage.getItem(TASKS_KEY)) || []; } catch { return []; }
  });
  const [view, setView] = useState('board');
  const [showNewTask, setShowNewTask] = useState(false);
  const [toast, setToast] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const tick = useTimers(tasks);
  const tokenClientRef = useRef(null);

  const isManager = user?.role === 'manager' || user?.role === 'boss';

  // Save tasks locally whenever they change
  useEffect(() => {
    localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
  }, [tasks]);

  // Load Google Identity Services
  useEffect(() => {
    if (!config) return;
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.async = true;
    script.defer = true;
    script.onload = () => initGoogle();
    document.head.appendChild(script);
    return () => document.head.removeChild(script);
  }, [config]);

  const initGoogle = () => {
    if (!window.google || !config) return;
    tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
      client_id: config.clientId,
      scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.send email profile',
      callback: async (resp) => {
        if (resp.access_token) {
          config.accessToken = resp.access_token;
          setConfig({...config});
          // Get user profile
          const profileRes = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
            headers: { Authorization: `Bearer ${resp.access_token}` }
          });
          const profile = await profileRes.json();
          const u = {
            name: profile.name,
            email: profile.email,
            picture: profile.picture,
            role: 'manager', // Default; could be stored in a separate sheet tab
          };
          setUser(u);
          showToast('Signed in as ' + profile.name, 'success');
        }
      }
    });
  };

  const handleSignIn = () => {
    if (!config) return;
    if (tokenClientRef.current) {
      tokenClientRef.current.requestAccessToken();
    } else {
      showToast('Google API not ready yet. Reload and try again.', 'error');
    }
  };

  const handleSaveConfig = (cfg) => {
    const full = { ...cfg, accessToken: null };
    localStorage.setItem(CONFIG_KEY, JSON.stringify(full));
    setConfig(full);
  };

  const showToast = (msg, type = '') => {
    setToast({ msg, type });
  };

  const handleNewTask = async (task) => {
    setShowNewTask(false);
    const updated = [task, ...tasks];
    setTasks(updated);
    showToast('Task posted!', 'success');
    if (config?.accessToken && config?.sheetId) {
      setSyncing(true);
      try {
        await appendTaskToSheet(config, task);
        if (task.assignedToEmail) await sendEmailNotification(config, task);
      } catch(e) { showToast('Sheet sync failed — saved locally', 'error'); }
      setSyncing(false);
    }
  };

  const handleAccept = async (task) => {
    const now = Date.now();
    const updated = tasks.map(t => t.id === task.id
      ? { ...t, acceptedAt: now, assignedTo: t.assignedTo || user?.name || 'Unknown' }
      : t
    );
    setTasks(updated);
    showToast('Task accepted — timer started', 'success');
    if (config?.accessToken && config?.sheetId) {
      try { await updateTaskInSheet(config, updated.find(t => t.id === task.id)); } catch {}
    }
  };

  const handleComplete = async (task) => {
    const now = Date.now();
    const dur = now - task.acceptedAt;
    const updated = tasks.map(t => t.id === task.id
      ? { ...t, completedAt: now, duration: dur }
      : t
    );
    setTasks(updated);
    showToast(`Done! Took ${formatDuration(dur)}`, 'success');
    if (config?.accessToken && config?.sheetId) {
      setSyncing(true);
      try { await updateTaskInSheet(config, updated.find(t => t.id === task.id)); } catch(e) {}
      setSyncing(false);
    }
  };

  const handleDelete = async (id) => {
    setTasks(tasks.filter(t => t.id !== id));
  };

  const handleSignOut = () => {
    setUser(null);
    setShowMenu(false);
    if (window.google) window.google.accounts.oauth2.revoke(config?.accessToken || '');
    setConfig(prev => prev ? { ...prev, accessToken: null } : null);
  };

  const open = tasks.filter(t => !t.acceptedAt && !t.completedAt);
  const inProg = tasks.filter(t => t.acceptedAt && !t.completedAt);
  const done = tasks.filter(t => t.completedAt);

  // ── SCREENS ──

  if (!config) {
    return <SetupScreen onSave={handleSaveConfig} />;
  }

  if (!user) {
    return <AuthScreen onSignIn={handleSignIn} />;
  }

  return (
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <span className="tb-logo">Bagavagabonds</span>
        <div className="tb-divider" />
        <span className="tb-title">Task Board</span>

        <button className={`tb-tab ${view === 'board' ? 'active' : ''}`} onClick={() => setView('board')}>Board</button>
        <button className={`tb-tab ${view === 'log' ? 'active' : ''}`} onClick={() => setView('log')}>History</button>

        <div className="tb-right">
          {syncing && <div className="sync-indicator"><div className="spinner" /><span>syncing</span></div>}
          {!syncing && config?.sheetId && <div className="sync-indicator"><div className="sync-dot" /><span>synced</span></div>}

          {isManager && (
            <button className="new-task-btn" onClick={() => setShowNewTask(true)}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New task
            </button>
          )}

          <div className="tb-avatar" onClick={() => setShowMenu(!showMenu)}>
            {initials(user.name)}
            {showMenu && (
              <div className="tb-user-menu" onClick={e => e.stopPropagation()}>
                <div className="tb-user-info">
                  <div className="tb-user-name">{user.name}</div>
                  <div className="tb-user-email">{user.email}</div>
                  <span className="tb-role-badge">{user.role}</span>
                </div>
                <button className="menu-item danger" onClick={handleSignOut}>Sign out</button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* VIEWS */}
      {view === 'board' && (
        <div className="board">
          {/* OPEN */}
          <div className="col">
            <div className="col-head">
              <div className="col-indicator" style={{background:'var(--red)'}} />
              <span className="col-name">Open</span>
              <span className="col-badge">{open.length}</span>
            </div>
            <div className="col-body">
              {open.length === 0 && <div className="col-empty">all clear</div>}
              {open.map(t => (
                <TaskCard key={t.id} task={t} currentUser={user} isManager={isManager}
                  onAccept={handleAccept} onComplete={handleComplete}
                  onDelete={handleDelete} tick={tick} />
              ))}
            </div>
          </div>

          {/* IN PROGRESS */}
          <div className="col">
            <div className="col-head">
              <div className="col-indicator" style={{background:'var(--amber)'}} />
              <span className="col-name">In progress</span>
              <span className="col-badge">{inProg.length}</span>
            </div>
            <div className="col-body">
              {inProg.length === 0 && <div className="col-empty">nothing active</div>}
              {inProg.map(t => (
                <TaskCard key={t.id} task={t} currentUser={user} isManager={isManager}
                  onAccept={handleAccept} onComplete={handleComplete}
                  onDelete={handleDelete} tick={tick} />
              ))}
            </div>
          </div>

          {/* DONE */}
          <div className="col">
            <div className="col-head">
              <div className="col-indicator" style={{background:'var(--accent)'}} />
              <span className="col-name">Done</span>
              <span className="col-badge">{done.length}</span>
            </div>
            <div className="col-body">
              {done.length === 0 && <div className="col-empty">nothing done yet</div>}
              {[...done].sort((a,b) => b.completedAt - a.completedAt).slice(0, 20).map(t => (
                <TaskCard key={t.id} task={t} currentUser={user} isManager={isManager}
                  onAccept={handleAccept} onComplete={handleComplete}
                  onDelete={handleDelete} tick={tick} />
              ))}
            </div>
          </div>
        </div>
      )}

      {view === 'log' && <LogView tasks={tasks} config={config} />}

      {/* MODALS */}
      {showNewTask && (
        <NewTaskModal currentUser={user} onClose={() => setShowNewTask(false)} onSave={handleNewTask} />
      )}

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
